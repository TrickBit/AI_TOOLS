# comfyui_workflows.ini
# =============================================================================
# Human-editable ComfyUI workflow pack definitions.
#
# HOW TO USE:
#   Add a new :workflow block below for each workflow pack you want to support.
#   Then run:  ai_tools comfyui setup
#   The script will present a picker, install selected packs, and record
#   everything in ai_installer.json. The ini file is only needed for the
#   first install — after that, ai_tools comfyui reinstall <id> works from
#   the JSON record alone.
#
# BLOCK STRUCTURE:
#   :workflow <id>          — machine id, no spaces, used in CLI
#   :name <display name>    — shown in picker
#   :purpose                — free text, indented, ends at next section
#   :nodes                  — custom nodes: <dirname>  <git_url>
#   :models                 — model files:  <filename>  <url>  <shared_dest>
#   :workflows              — workflow JSONs: <filename>  <url>
#   :yaml                   — extra_model_paths entries: <comfyui_key>  <shared_subdir>
#
# SHARED DEST paths are relative to AI_SHARED_ROOT (the shared video tree base).
# YAML paths are also relative to AI_SHARED_ROOT.
#
# Lines beginning with # are comments. Blank lines are ignored.
# Indentation is optional but recommended for readability.
# =============================================================================


# =============================================================================
:workflow ltx-director-sulphur
:name LTX Director + Sulphur 2
:purpose
    Text-to-video, image-to-video, multi-reference image input, lip-sync
    and audio — via the WhatDreamsCost Director node and Sulphur 2 model.
    Sulphur 2 is a fine-tune of LTX 2.3 (22B). Uses Gemma 3 12B as text
    encoder (replaces T5 from LTX 0.9.x — do NOT mix encoders across versions).
    Minimum 12GB VRAM. RTX 3060 runs Q5_K_M GGUF comfortably.
    FP8 native requires RTX 40xx+; GGUFs via ComfyUI-GGUF give better
    VRAM efficiency on Ampere (RTX 30xx).

