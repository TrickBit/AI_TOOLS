:yaml
    # Maps ComfyUI model-type keys to subdirs under AI_SHARED_ROOT.
    # These accumulate in extra_model_paths.yaml — all installed workflow
    # packs contribute, duplicates are deduplicated on write.
    # NOTE: upscaler key is latent_upscale_models (not upscale_models).
    checkpoints            video/Models/
    diffusion_models       video/Models/
    unet                   video/Models/
    controlnet             video/Models/
    vae                    video/VAE/
    text_encoders          video/TextEncoders/
    clip                   video/TextEncoders/
    loras                  video/LoRAs/
    latent_upscale_models  video/upscale_models/
